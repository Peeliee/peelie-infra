services:
  nginx:
    image: nginx:1.27-alpine
    container_name: peelie-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - spring
    restart: unless-stopped
    networks:
      - peelie-net

  spring:
    image: ${ECR_PUBLIC_REGISTRY}/${ECR_PUBLIC_REPOSITORY}:${SPRING_TAG}
    container_name: peelie-spring
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      INTEGRATION_CHAT_FASTAPI_BASE_URL: http://fastapi:8000
    depends_on:
      - redis
      - fastapi
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.7
    networks:
      - peelie-net

  fastapi:
    image: ${ECR_PUBLIC_REGISTRY}/${ECR_PUBLIC_REPOSITORY}:${AVATAR_TAG}
    container_name: peelie-fastapi
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    environment:
      DATABASE_URL: ${PY_DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY}
      REDIS_CONSUMER_GROUP: ${REDIS_CONSUMER_GROUP}
      REDIS_CONSUMER_NAME: ${REDIS_CONSUMER_NAME}
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 320m
    cpus: 0.4
    networks:
      - peelie-net

  worker:
    image: ${ECR_PUBLIC_REGISTRY}/${ECR_PUBLIC_REPOSITORY}:${AVATAR_TAG}
    container_name: peelie-worker
    command: ["python", "-m", "apps.worker.worker"]
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: ${PY_DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY}
      REDIS_CONSUMER_GROUP: ${REDIS_CONSUMER_GROUP}
      REDIS_CONSUMER_NAME: ${REDIS_CONSUMER_NAME}
      REDIS_BLOCK_MS: ${REDIS_BLOCK_MS}
      REDIS_COUNT: ${REDIS_COUNT}
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.3
    networks:
      - peelie-net

  redis:
    image: redis:7.4-alpine
    container_name: peelie-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    mem_limit: 96m
    cpus: 0.2
    networks:
      - peelie-net

networks:
  peelie-net:
    driver: bridge

volumes:
  redis-data:
